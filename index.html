<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Terra Overworld 2 — Biome List</title>
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body>
        <div id="container">
            <header>
                <div>
                    <h1>Terra Overworld 2</h1>
                    <p class="subtitle">Biome List</p>
                </div>
                <div>
                    <input
                        type="text"
                        id="search"
                        placeholder="Search biomes…"

            <main id="app"><p class="loading">Loading…</p></main>
        </div>

        <div id="lightbox" class="hidden"></div>

        <script type="module" src="./src/main.js"></script>
    </body>
